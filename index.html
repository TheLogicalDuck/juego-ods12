<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Reciclador ODS 12</title>
    
    <!-- Fuente profesional de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a252c;
            overflow: hidden; 
            font-family: 'Poppins', sans-serif; /* Fuente moderna */
            color: #e2e8f0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none; 
        }
        canvas {
            display: block;
            background-color: #a8e6cf;
        }

        /* --- ESTILO GLASSMORPHISM (Vidrio Esmerilado) --- */
        .glass-panel {
            position: absolute;
            background: rgba(15, 23, 42, 0.65); /* Azul muy oscuro transparente */
            backdrop-filter: blur(12px); /* Efecto borroso de Apple */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        /* --- PANEL IZQUIERDO (Inventario) --- */
        #ui-container { top: 20px; left: 20px; min-width: 180px; }
        
        h3 { 
            margin: 0 0 15px 0; 
            color: #fbbf24; /* Amarillo dorado */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.1em;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .puntos-destacados { 
            color: #4ade80; /* Verde brillante */
            font-weight: 800; 
            font-size: 1.4em;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.4); /* Resplandor */
        }

        .badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        #ui-peso { 
            font-size: 0.85em; 
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 3px 8px;
            border-radius: 8px;
        }

        /* --- PANEL DERECHO (Ranking) --- */
        #ranking-container { top: 20px; right: 20px; min-width: 220px; }
        
        #lista-ranking { 
            list-style: none; /* Quitamos los números feos */
            padding: 0; 
            margin: 0; 
        }
        
        #lista-ranking li { 
            background: rgba(255,255,255,0.05);
            margin-bottom: 8px; 
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            transition: transform 0.2s;
        }
        #lista-ranking li:hover {
            transform: translateX(-5px);
            background: rgba(255,255,255,0.1);
        }

        /* --- CONTROLES MÓVILES (Estilo Arcade Moderno) --- */
        #controles-moviles {
            display: none; 
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 180px;
            pointer-events: none; 
            z-index: 20;
        }

        .cruceta {
            position: absolute;
            left: 30px;
            bottom: 30px;
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 8px;
            pointer-events: auto;
        }

        .btn-accion-container {
            position: absolute;
            right: 40px;
            bottom: 40px;
            pointer-events: auto;
        }

        .btn-tactil {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            touch-action: manipulation;
        }
        .btn-tactil:active { 
            background: rgba(255, 255, 255, 0.4); 
            transform: scale(0.95);
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        #btn-accion {
            width: 80px;
            height: 80px;
            font-size: 35px;
            background: rgba(74, 222, 128, 0.3); 
            border-color: rgba(74, 222, 128, 0.6);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }
        #btn-accion:active { background: rgba(74, 222, 128, 0.6); }

        @media (max-width: 768px) {
            #controles-moviles { display: block; }
            .glass-panel { padding: 12px; transform: scale(0.85); transform-origin: top; }
        }
    </style>
</head>
<body>

    <!-- Panel Izquierdo -->
    <div id="ui-container" class="glass-panel">
        <h3>Tu Impacto</h3>
        <div class="info-row">
            <span>👤 <span id="ui-nombre" style="color: #60a5fa; font-weight: 600;"></span></span>
        </div>
        <div class="info-row">
            <span>⭐ Puntos:</span>
            <span id="ui-puntos" class="puntos-destacados">0</span>
        </div>
        
        <h3 style="margin-top: 15px; font-size: 0.9em; color:#94a3b8;">Inventario</h3>
        <div class="info-row" style="margin-bottom: 15px;">
            <span>🎒 Carga:</span>
            <span id="ui-peso">Ligera</span>
        </div>
        
        <div class="info-row">
            <span>🧴 Plástico</span>
            <span class="badge" id="inv-plastico">0</span>
        </div>
        <div class="info-row">
            <span>🗞️ Papel</span>
            <span class="badge" id="inv-papel">0</span>
        </div>
    </div>

    <!-- Panel Derecho -->
    <div id="ranking-container" class="glass-panel">
        <h3>🏆 Leaderboard</h3>
        <ul id="lista-ranking">
            <li>Cargando datos...</li>
        </ul>
    </div>

    <!-- Controles Móviles -->
    <div id="controles-moviles">
        <div class="cruceta">
            <div id="btn-up" class="btn-tactil">▲</div>
            <div id="btn-left" class="btn-tactil">◀</div>
            <div id="btn-down" class="btn-tactil">▼</div>
            <div id="btn-right" class="btn-tactil">▶</div>
        </div>
        <div class="btn-accion-container">
            <div id="btn-accion" class="btn-tactil">♻️</div>
        </div>
    </div>

    <!-- Canvas -->
    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>
    
</body>
</html>
